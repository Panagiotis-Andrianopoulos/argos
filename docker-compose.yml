# ============================================================
# ARGOS — Local development stack
# ============================================================
# Runs: Postgres, MinIO, MLflow, pgAdmin
#
# Startup:    docker compose up -d
# Logs:       docker compose logs -f
# Shutdown:   docker compose down
# Full reset: docker compose down -v  (deletes volumes!)
# ============================================================

services:

  # --------------------------------------------------------
  # Postgres — data warehouse
  # --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: argos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ARGOS_DB_NAME:-argos}
      POSTGRES_USER: ${ARGOS_DB_USER:-argos}
      POSTGRES_PASSWORD: ${ARGOS_DB_PASSWORD:-change_me_in_real_env}
    ports:
      - "${ARGOS_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ARGOS_DB_USER:-argos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argos-net

  # --------------------------------------------------------
  # MinIO — S3-compatible object storage
  # --------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: argos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ARGOS_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARGOS_S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argos-net

  # --------------------------------------------------------
  # MinIO init — creates the bucket on first startup
  # --------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: argos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${ARGOS_S3_ACCESS_KEY:-minioadmin} ${ARGOS_S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${ARGOS_S3_BUCKET:-argos-data};
      echo 'MinIO bucket ready.';
      "
    networks:
      - argos-net

  # --------------------------------------------------------
  # MLflow — experiment tracking server
  # --------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: argos-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${ARGOS_S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${ARGOS_S3_SECRET_KEY:-minioadmin}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${ARGOS_DB_USER:-argos}:${ARGOS_DB_PASSWORD:-change_me_in_real_env}@postgres:5432/${ARGOS_DB_NAME:-argos}
      --default-artifact-root s3://${ARGOS_S3_BUCKET:-argos-data}/mlflow
    ports:
      - "5000:5000"
    networks:
      - argos-net

  # --------------------------------------------------------
  # pgAdmin — Postgres web UI (optional)
  # --------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: argos-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@argos.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - argos-net

# ============================================================
# Volumes — persistent data outside of containers
# ============================================================
volumes:
  pgdata:
    name: argos-pgdata
  miniodata:
    name: argos-miniodata

# ============================================================
# Networks — internal bridge network
# ============================================================
networks:
  argos-net:
    name: argos-net
    driver: bridge
