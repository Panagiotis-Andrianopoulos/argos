# ============================================================
# ARGOS — Local development stack
# ============================================================
# Runs: Postgres, MinIO, MLflow, pgAdmin
#
# Startup:    docker compose up -d
# Logs:       docker compose logs -f
# Shutdown:   docker compose down
# Full reset: docker compose down -v  (deletes volumes!)
# ============================================================

# ============================================================
# Common Airflow configuration (YAML anchor — reused by all Airflow services)
# ============================================================
x-airflow-common: &airflow-common
  image: apache/airflow:3.2.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${ARGOS_AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://argos-airflow-api-server:8080/execution/"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${ARGOS_DB_USER:-argos}:${ARGOS_DB_PASSWORD:-change_me_in_real_env}@postgres:5432/${ARGOS_AIRFLOW_DB_NAME:-airflow}
    AIRFLOW__API__BASE_URL: "http://localhost:8080"
    AIRFLOW__API_AUTH__JWT_SECRET: ${ARGOS_AIRFLOW_FERNET_KEY}
    PYTHONPATH: /opt/airflow/src
    PIP_ADDITIONAL_REQUIREMENTS: >-
      pydantic-settings>=2.14.0
      sqlalchemy>=2.0.49
      psycopg[binary]>=3.3.3
      asyncpg>=0.31.0
      httpx>=0.28.1
      boto3>=1.42.93
      tenacity>=9.1.4
      alembic>=1.18.4
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
  networks:
    - argos-net

services:

  # --------------------------------------------------------
  # Postgres — data warehouse
  # --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: argos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ARGOS_DB_NAME:-argos}
      POSTGRES_USER: ${ARGOS_DB_USER:-argos}
      POSTGRES_PASSWORD: ${ARGOS_DB_PASSWORD:-change_me_in_real_env}
    ports:
      - "${ARGOS_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ARGOS_DB_USER:-argos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argos-net

  # --------------------------------------------------------
  # MinIO — S3-compatible object storage
  # --------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: argos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ARGOS_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ARGOS_S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argos-net

  # --------------------------------------------------------
  # MinIO init — creates the bucket on first startup
  # --------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: argos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${ARGOS_S3_ACCESS_KEY:-minioadmin} ${ARGOS_S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${ARGOS_S3_BUCKET:-argos-data};
      echo 'MinIO bucket ready.';
      "
    networks:
      - argos-net

  # --------------------------------------------------------
  # MLflow — experiment tracking server
  # --------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: argos-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${ARGOS_S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${ARGOS_S3_SECRET_KEY:-minioadmin}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${ARGOS_DB_USER:-argos}:${ARGOS_DB_PASSWORD:-change_me_in_real_env}@postgres:5432/${ARGOS_DB_NAME:-argos}
      --default-artifact-root s3://${ARGOS_S3_BUCKET:-argos-data}/mlflow
    ports:
      - "5000:5000"
    networks:
      - argos-net

  # --------------------------------------------------------
  # Airflow init — one-shot DB migration + admin user creation
  # --------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: argos-airflow-init
    entrypoint: >
      /bin/bash -c "
      PGPASSWORD=${ARGOS_DB_PASSWORD:-change_me_in_real_env} psql -h postgres -U ${ARGOS_DB_USER:-argos} -d ${ARGOS_DB_NAME:-argos} -tc \"SELECT 1 FROM pg_database WHERE datname='${ARGOS_AIRFLOW_DB_NAME:-airflow}'\" | grep -q 1 || PGPASSWORD=${ARGOS_DB_PASSWORD:-change_me_in_real_env} psql -h postgres -U ${ARGOS_DB_USER:-argos} -d ${ARGOS_DB_NAME:-argos} -c \"CREATE DATABASE ${ARGOS_AIRFLOW_DB_NAME:-airflow}\";
      airflow db migrate &&
      airflow users create --username ${ARGOS_AIRFLOW_ADMIN_USER:-admin} --firstname admin --lastname admin --role Admin --email admin@argos.local --password ${ARGOS_AIRFLOW_ADMIN_PASSWORD:-admin} || true;
      "
    restart: "no"

  # --------------------------------------------------------
  # Airflow API server — UI + REST API at localhost:8080
  # --------------------------------------------------------
  airflow-api-server:
    <<: *airflow-common
    container_name: argos-airflow-api-server
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------
  # Airflow scheduler — orchestrates task execution
  # --------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: argos-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------
  # Airflow DAG processor — parses DAG files (separated in 3.x)
  # --------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: argos-airflow-dag-processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------
  # Airflow triggerer — runs deferred async tasks
  # --------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: argos-airflow-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

# ============================================================
# Volumes — persistent data outside of containers
# ============================================================
volumes:
  pgdata:
    name: argos-pgdata
  miniodata:
    name: argos-miniodata
  airflow_logs:
    name: argos-airflow-logs

# ============================================================
# Networks — internal bridge network
# ============================================================
networks:
  argos-net:
    name: argos-net
    driver: bridge
